version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: infravision_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-infravision}
      POSTGRES_USER: ${POSTGRES_USER:-infra_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infra_user} -d ${POSTGRES_DB:-infravision}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infravision_backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ai_models:/app/app/ml_models
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-infra_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-infravision}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: infravision_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}

  nginx:
    image: nginx:alpine
    container_name: infravision_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
    driver: local
  ai_models:
    driver: local
  nginx_logs:
    driver: local

networks:
  default:
    name: infravision_network

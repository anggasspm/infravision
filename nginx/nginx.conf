# nginx/nginx.conf
# InfraVision — Nginx Reverse Proxy + SSL

# Redirect semua HTTP ke HTTPS
server {
    listen 80;
    server_name infravision.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl;
    server_name infravision.example.com;

    ssl_certificate     /etc/letsencrypt/live/infravision.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/infravision.example.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # File upload limit (foto laporan)
    client_max_body_size 10M;

    # ── Backend FastAPI (/api/) ──────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── AI Service (/ai/) ────────────────────────────────────
    location /ai/ {
        proxy_pass         http://ai_service:8001/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;  # AI inference bisa lebih lama
    }

    # ── Swagger Docs (dev only — tutup di production) ───────
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }

    # ── React SPA (semua route lainnya) ─────────────────────
    location / {
        proxy_pass       http://frontend:3000/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;

        # Support React Router (client-side routing)
        proxy_intercept_errors on;
        error_page 404 = @fallback;
    }

    location @fallback {
        proxy_pass http://frontend:3000/;
    }
}
